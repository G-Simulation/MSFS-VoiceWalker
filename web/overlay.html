<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VoiceWalker Overlay</title>
<style>
  :root {
    --bg: rgba(11, 18, 32, 0.82);
    --border: #233457;
    --fg: #e9eefc;
    --muted: #8696b8;
    --good: #3fdc8a;
    --warn: #ffb454;
    --bad:  #ff6b6b;
    --speaking: #ffe066;
    --accent: #6aa5ff;
  }
  html, body { margin: 0; padding: 0; font-family: "Segoe UI", system-ui, sans-serif;
               background: transparent; color: var(--fg); font-size: 13px; }
  body { padding: 8px; }
  .panel {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px;
    backdrop-filter: blur(8px);
    min-width: 220px;
  }
  .title { font-size: 11px; color: var(--muted); text-transform: uppercase;
           letter-spacing: 0.08em; margin-bottom: 6px; display: flex;
           justify-content: space-between; align-items: center; }
  .title .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .title .dot.good { background: var(--good); box-shadow: 0 0 8px var(--good); }
  .title .dot.warn { background: var(--warn); box-shadow: 0 0 8px var(--warn); }
  .title .dot.bad  { background: var(--bad);  box-shadow: 0 0 8px var(--bad); }
  .radar-wrap { position: relative; margin: 6px 0; padding: 6px 0; }
  .radar-wrap::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at center, rgba(106,165,255,0.08), transparent 60%);
    pointer-events: none; border-radius: 999px;
  }
  canvas#radar { display: block; margin: 0 auto;
                 filter: drop-shadow(0 6px 18px rgba(47,92,255,0.18)); }
  .row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
  .row .pdot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .row.speaking .pdot { background: var(--speaking); box-shadow: 0 0 8px var(--speaking); }
  .row.speaking .nm { color: var(--speaking); }
  .nm { flex: 1; font-weight: 600; font-size: 12px; }
  .d  { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 11px; }
  .empty { color: var(--muted); font-size: 11px; padding: 4px 0; text-align: center; }
  .hint { color: var(--muted); font-size: 10px; margin-top: 6px; text-align: center;
          border-top: 1px solid var(--border); padding-top: 6px; }
  .me { font-size: 10px; color: var(--muted); text-align: center; margin-top: 4px; }
  .me .badge { display: inline-block; padding: 1px 6px; border-radius: 10px;
               background: rgba(106,165,255,0.18); color: var(--accent);
               font-weight: 600; margin-left: 4px; font-size: 10px; }
  .offline {
    border: 1px dashed var(--warn); border-radius: 8px;
    padding: 10px; text-align: center; margin: 8px 0;
    color: var(--warn); font-size: 11px; line-height: 1.4;
  }
  .offline .big { font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--fg); }

  /* OBS Stream-Overlay-Mode: /overlay.html?stream=1
     Transparenter Background, minimale UI, nur sprechende Peers sichtbar.
     Browser-Source in OBS: URL setzen, Breite/Hoehe nach Geschmack, Background
     transparent, "Refresh browser when scene becomes active" anschalten. */
  body.stream-mode { background: transparent !important; padding: 6px; }
  body.stream-mode .panel {
    background: transparent !important;
    border: none !important;
    backdrop-filter: none !important;
    padding: 0 !important;
    min-width: 0 !important;
  }
  body.stream-mode .title,
  body.stream-mode .radar-wrap,
  body.stream-mode .me,
  body.stream-mode .hint,
  body.stream-mode .offline { display: none !important; }
  body.stream-mode #list .empty { display: none; }
  body.stream-mode #list .row {
    display: none;
    background: rgba(11, 18, 32, 0.72);
    border-left: 3px solid var(--speaking);
    border-radius: 6px;
    padding: 6px 10px;
    margin-bottom: 4px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }
  body.stream-mode #list .row.speaking { display: flex; }
  body.stream-mode #list .row .d { display: none; }
  body.stream-mode #list .row .nm { color: var(--fg); font-size: 14px; }
</style>
</head>
<body>
<div class="panel">
  <div class="title">
    <span style="display:inline-flex;align-items:center;gap:8px">
      <span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;overflow:hidden;background:linear-gradient(135deg,#6aa5ff,#2f5cff);box-shadow:0 4px 10px -3px rgba(47,92,255,0.5)">
        <svg viewBox="0 0 24 24" width="16" height="16" style="color:#fff" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="0.8" opacity="0.45" fill="none"/>
          <circle cx="12" cy="12" r="6.5" stroke="currentColor" stroke-width="0.8" opacity="0.6" fill="none"/>
          <circle cx="16.5" cy="8" r="0.9" fill="#3fdc8a"/>
          <rect x="10" y="7.5" width="4" height="6.5" rx="2" fill="currentColor"/>
          <path d="M8.5 12.2 a3.5 3.5 0 0 0 7 0" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/>
          <line x1="12" y1="15.5" x2="12" y2="17.8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </span>
      VoiceWalker
    </span>
    <span class="dot" id="connDot"></span>
  </div>

  <div id="offline" class="offline" style="display:none">
    <div class="big">Keine Verbindung zur App</div>
    <div>VoiceWalker-App nicht gestartet.</div>
  </div>

  <div class="radar-wrap">
    <canvas id="radar" width="220" height="220"></canvas>
  </div>

  <div class="me" id="me">—</div>

  <div id="list"><div class="empty">wartet auf Mesh…</div></div>
  <div class="hint" id="hint">Leertaste / PTT = Sprechen</div>
</div>

<!-- Externe JS-Datei — muss nach /overlay.js geladen werden, weil der
     CSP-Header `script-src 'self'` keine Inline-<script>-Bloecke erlaubt.
     Das war der Grund warum das MSFS-Panel bisher schwarz war: die
     Inline-Logik wurde von Coherent GT geblockt. -->
<script src="/overlay.js" defer></script>
</body>
</html>
