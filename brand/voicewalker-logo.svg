<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" fill="none"
     font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif">

  <defs>
    <!-- Subtiler Vertikal-Gradient fuer die Kapsel (gibt Volumen) -->
    <linearGradient id="micBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#254580"/>
      <stop offset="48%"  stop-color="#1a3568"/>
      <stop offset="100%" stop-color="#152a56"/>
    </linearGradient>
    <!-- Leichter Hauch auf den Panels fuer Tiefe -->
    <linearGradient id="panelBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8cd0e1"/>
      <stop offset="100%" stop-color="#6bb9cf"/>
    </linearGradient>
    <linearGradient id="panelLime" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#d1e251"/>
      <stop offset="100%" stop-color="#b6ca2e"/>
    </linearGradient>
    <linearGradient id="panelGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7ec456"/>
      <stop offset="100%" stop-color="#5ea83a"/>
    </linearGradient>
    <!-- Drop-Shadow unterm Mikro -->
    <radialGradient id="shadowUnder" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="rgba(10,20,40,0.30)"/>
      <stop offset="100%" stop-color="rgba(10,20,40,0)"/>
    </radialGradient>
  </defs>

  <!-- ======================================================================
       LANDSCHAFT — drei farbige Panels, sauber gesetzt mit feinen weissen
       Gaps, subtile Vertikal-Gradients geben Tiefe
       ====================================================================== -->
  <!-- Hinten: dunkelgrün (rechter hoher Peak) -->
  <path d="M 253 410 L 430 410 L 325 245 Z" fill="url(#panelGreen)"/>

  <!-- Mitte: hellgrün/lime (zentraler höchster Peak) -->
  <path d="M 155 410 L 335 410 L 238 195 Z" fill="url(#panelLime)"/>

  <!-- Vorne: blau (oberer linker Peak, kürzer) -->
  <path d="M 70 410 L 230 410 L 158 285 Z" fill="url(#panelBlue)"/>

  <!-- Kleiner hellgrüner Streifen vorn rechts (Tiefe am Boden) -->
  <path d="M 295 410 L 430 410 L 405 385 L 318 385 Z" fill="url(#panelLime)"/>

  <!-- Feine weisse Trenn-Falze zwischen den Panels -->
  <g stroke="#ffffff" stroke-width="5" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <path d="M 155 410 L 230 410 L 158 285"/>
    <path d="M 253 410 L 335 410 L 238 195"/>
  </g>

  <!-- ======================================================================
       BODEN-SCHATTEN unterm Mikro (gibt Bodenkontakt)
       ====================================================================== -->
  <ellipse cx="250" cy="385" rx="80" ry="10" fill="url(#shadowUnder)"/>

  <!-- ======================================================================
       WEISSER HALO — folgt der Mikro-Silhouette mit gleichmaessigem Abstand
       ====================================================================== -->
  <g fill="#ffffff">
    <rect x="176" y="70" width="148" height="212" rx="74"/>
    <path d="M 152 198
             Q 152 312 250 312
             Q 348 312 348 198
             L 348 220
             Q 348 298 250 298
             Q 152 298 152 220 Z"/>
    <rect x="234" y="300" width="32" height="60"/>
    <rect x="207" y="348" width="86" height="26" rx="6"/>
  </g>

  <!-- ======================================================================
       MIKROFON — Kapsel mit Vertikal-Gradient, realistischere Proportionen
       ====================================================================== -->
  <!-- Kapsel -->
  <rect x="186" y="80" width="128" height="194" rx="64" fill="url(#micBody)"/>

  <!-- Feine Kapsel-Rand-Highlight (heller Saum links-oben fuer 3D-Feel) -->
  <path d="M 200 95 Q 194 170 200 255"
        stroke="rgba(255,255,255,0.12)" stroke-width="2.5"
        fill="none" stroke-linecap="round"/>

  <!-- Yoke (U-Buegel) -->
  <path d="M 164 200
           Q 164 302 250 302
           Q 336 302 336 200
           L 320 200
           Q 320 285 250 285
           Q 180 285 180 200 Z"
        fill="url(#micBody)"/>

  <!-- Stiel -->
  <rect x="241" y="293" width="18" height="58" fill="url(#micBody)"/>
  <!-- Fuss-Platte -->
  <rect x="214" y="348" width="72" height="22" rx="5" fill="url(#micBody)"/>

  <!-- Grill-Linien in der Kapsel (11 weisse Linien, oval verteilt) -->
  <g stroke="#ffffff" stroke-linecap="round" fill="none">
    <line x1="204" y1="122" x2="204" y2="232" stroke-width="4"/>
    <line x1="216" y1="110" x2="216" y2="244" stroke-width="5"/>
    <line x1="227" y1="102" x2="227" y2="252" stroke-width="5"/>
    <line x1="238" y1="97"  x2="238" y2="257" stroke-width="5"/>
    <line x1="249" y1="94"  x2="249" y2="260" stroke-width="5.5"/>
    <line x1="260" y1="94"  x2="260" y2="260" stroke-width="5"/>
    <line x1="271" y1="97"  x2="271" y2="257" stroke-width="5"/>
    <line x1="282" y1="102" x2="282" y2="252" stroke-width="5"/>
    <line x1="293" y1="110" x2="293" y2="244" stroke-width="5"/>
    <line x1="305" y1="122" x2="305" y2="232" stroke-width="4"/>
  </g>

  <!-- Top-Bogen (angedeuteter Bump oben) -->
  <path d="M 220 88 Q 250 78 280 88"
        stroke="#ffffff" stroke-width="3.5"
        fill="none" stroke-linecap="round"/>

  <!-- Dezente Trennrille zwischen Yoke und Stiel -->
  <line x1="238" y1="300" x2="262" y2="300"
        stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- ======================================================================
       TEXT
       ====================================================================== -->
  <text x="250" y="478"
        font-weight="900" font-size="72"
        text-anchor="middle" fill="#333333"
        letter-spacing="-1.5">VOICEWALKER</text>

  <text x="250" y="522"
        font-weight="400" font-size="22"
        text-anchor="middle" fill="#5a5a5a"
        letter-spacing="4">Audio Map Experience</text>
</svg>
