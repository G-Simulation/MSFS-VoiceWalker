<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-control" content="NO-CACHE" />
    <title>MSFSVoiceWalker</title>

    <link rel="stylesheet" href="/SCSS/common.css" />

    <script type="text/javascript" src="/JS/coherent.js"></script>
    <script type="text/javascript" src="/JS/common.js"></script>
    <script type="text/javascript" src="/JS/dataStorage.js"></script>
    <script type="text/javascript" src="/JS/buttons.js"></script>
    <script type="text/javascript" src="/JS/Services/ToolBarPanels.js"></script>
    <script type="text/javascript" src="/JS/simvar.js"></script>
    <script type="text/javascript" src="/Pages/VCockpit/Instruments/Shared/Utils/DataReadManager.js"></script>
    <script type="text/javascript" src="/Pages/VCockpit/Instruments/Shared/BaseInstrument.js"></script>

    <link rel="import" href="/templates/NewPushButton/NewPushButton.html" />
    <link rel="import" href="/templates/ingameUi/ingameUi.html" />
    <link rel="import" href="/templates/ingameUiHeader/ingameUiHeader.html" />

    <style>
      /* NotoEmoji-Regular.ttf — SIL Open Font License 1.1
         Lizenz-Datei liegt unter ./fonts/LICENSE_OFL.txt
         Coherent GT hat keine Emoji-Glyphen in der Default-Font, deswegen
         laden wir Noto Emoji als Fallback-Familie. Pattern verifiziert aus
         steffieth-autopilot-panel/MyPanel.css (Digital-7 wird genauso geladen). */
      @font-face {
        font-family: "VW Emoji";
        src: url("/InGamePanels/MSFSVoiceWalker/fonts/NotoEmoji-Regular.ttf") format("truetype"),
             url("./fonts/NotoEmoji-Regular.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
      /* Emojis ISOLIERT in NotoEmoji rendern — nicht als Fallback-Chain, sonst
         springt der Coherent-Renderer auf NotoEmoji weil er "Segoe UI" nicht
         kennt und alle Buchstaben werden Tofu. Stattdessen: jedes Emoji in
         <span class="vw-emoji"> einwickeln. */
      .vw-emoji { font-family: "VW Emoji"; font-style: normal; }
      .vw-icon  { vertical-align: -2px; display: inline-block; }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; }

      .ingameUiContent, .ingameUiWrapper {
        flex: 1 1 auto; overflow: auto;
        display: flex; flex-direction: column;
        min-height: 0; min-width: 0;
      }
      ingame-ui.fittedContent .ingameUiWrapper { margin: 0 !important; }

      :root {
        --bg:      #0b1220;
        --fg:      #e9eefc;
        --muted:   #8696b8;
        --border:  #233457;
        --accent:  #6aa5ff;
        --good:    #3fdc8a;
        --warn:    #ffb454;
        --bad:     #ff6b6b;
        --speak:   #ffe066;
      }

      #vw-root {
        position: relative; flex: 1 1 auto;
        min-height: 0; min-width: 0;
        display: flex; flex-direction: column;
        background: var(--bg); color: var(--fg);
        font-family: "Segoe UI", system-ui, sans-serif;
        font-size: 13px; padding: 10px; gap: 8px;
      }

      /* HEADER: Connection-Dot + Callsign + Pro-Badge + Zoom-Label */
      .vw-header {
        display: flex; align-items: center; gap: 8px;
        flex-shrink: 0;
      }
      .vw-dot {
        width: 9px; height: 9px; border-radius: 50%;
        background: var(--bad); flex-shrink: 0;
        /* Coherent GT respektiert flex `gap` nicht zuverlaessig; explizites
           margin damit der Dot nicht direkt am Status-Text klebt. */
        margin-right: 6px;
      }
      .vw-dot.good { background: var(--good); box-shadow: 0 0 8px var(--good); }
      .vw-dot.warn { background: var(--warn); box-shadow: 0 0 8px var(--warn); }
      #vw-label {
        font-size: 10px; color: var(--muted);
        text-transform: uppercase; letter-spacing: 0.08em;
      }
      #vw-callsign {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 13px; font-weight: 600; color: var(--fg);
        margin-left: 4px;
      }
      #vw-probadge {
        display: none;
        padding: 1px 6px; border-radius: 999px;
        font-size: 9px; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.1em;
        background: linear-gradient(90deg, var(--accent), var(--good));
        color: #0b1220;
      }
      #vw-probadge.visible { display: inline-block; }
      #vw-zoom {
        margin-left: auto;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 10px; color: var(--muted);
        padding: 2px 6px; border-radius: 4px;
        background: rgba(106,165,255,0.08);
        border: 1px solid var(--border);
      }

      /* ROOM-BADGE: privates Room-Label, nur sichtbar wenn gejoint */
      #vw-room {
        display: none;
        align-items: center; gap: 6px; flex-shrink: 0;
        padding: 3px 8px; border-radius: 999px;
        font-size: 10px; font-weight: 600;
        background: rgba(106,165,255,0.12);
        border: 1px solid var(--border);
        color: var(--fg);
      }
      #vw-room.visible { display: inline-flex; }

      /* RADAR */
      #vw-radar-wrap {
        flex: 1 1 auto; width: 100%;
        display: flex; align-items: center; justify-content: center;
        min-height: 0;
      }
      canvas#radar {
        display: block; max-width: 100%; max-height: 100%;
        cursor: ns-resize;
      }

      /* SPEAKING-BANNER: prominenter Hinweis wer gerade spricht */
      #vw-speaking {
        display: none; flex-shrink: 0;
        padding: 4px 10px; border-radius: 6px;
        background: rgba(255, 224, 102, 0.14);
        border-left: 3px solid var(--speak);
        font-size: 12px; font-weight: 600; color: var(--fg);
        text-align: center;
      }
      #vw-speaking.visible { display: block; }

      /* MIC-LEVEL: kompakte 3-Pixel-Bar ueber den Action-Buttons */
      #vw-miclevel-wrap {
        height: 3px; width: 100%; flex-shrink: 0;
        background: rgba(106,165,255,0.08);
        border-radius: 2px; overflow: hidden;
      }
      #vw-miclevel {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, var(--accent), var(--good), var(--warn));
        transition: width 80ms linear;
      }

      /* ACTION-BUTTONS */
      .vw-actions {
        display: flex; gap: 6px; flex-shrink: 0;
      }
      .vw-btn {
        flex: 1; padding: 6px 8px;
        background: rgba(106,165,255,0.08);
        border: 1px solid var(--border); border-radius: 6px;
        color: var(--fg); font-size: 11px; font-weight: 600;
        cursor: pointer; text-align: center;
        transition: all 0.12s;
        user-select: none;
      }
      .vw-btn:hover { background: rgba(106,165,255,0.18); }
      .vw-btn.active {
        background: var(--accent); color: #0b1220;
        border-color: var(--accent);
      }
      .vw-btn.ptt.live {
        background: var(--good); color: #0b1220;
        border-color: var(--good);
        box-shadow: 0 0 12px rgba(63,220,138,0.4);
      }

      /* PEER-LISTE */
      #vw-peers {
        flex-shrink: 0; display: flex; flex-direction: column; gap: 3px;
        max-height: 95px; overflow: hidden;
      }
      .vw-peer {
        display: flex; align-items: center; gap: 6px;
        padding: 2px 6px; border-radius: 4px;
        font-size: 11px;
      }
      .vw-peer.speaking {
        background: rgba(255,224,102,0.10);
        border-left: 2px solid var(--speak);
      }
      .vw-peer .pn {
        flex: 1; color: var(--fg);
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .vw-peer .pd {
        color: var(--muted); font-size: 10px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        flex-shrink: 0;
      }
      .vw-peer.far .pn, .vw-peer.far .pd { color: #556582; }

      #vw-peers-empty {
        font-size: 11px; color: var(--muted);
        text-align: center; padding: 4px 0;
      }
      #vw-peers-more {
        font-size: 10px; color: var(--muted);
        text-align: center; padding: 2px 0;
      }

      /* STATUS-ZEILE unten */
      #vw-status {
        font-size: 10px; color: var(--muted);
        text-align: center; flex-shrink: 0;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
      }

      /* TABS — Radar / Setup / Pro & Events. Groesser, mit Accent-Underline. */
      .vw-tabs {
        display: flex; flex-shrink: 0;
        border-bottom: 1px solid var(--border);
        margin: 4px -10px 0;
        background: rgba(15, 25, 48, 0.5);
      }
      .vw-tab {
        flex: 1; padding: 11px 10px 9px;
        background: transparent;
        color: var(--muted);
        border: none;
        border-bottom: 2px solid transparent;
        cursor: pointer;
        font-size: 11px; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.12em;
        transition: color 0.15s, border-color 0.15s, background 0.15s;
        user-select: none;
      }
      .vw-tab:hover { color: var(--fg); background: rgba(106,165,255,0.05); }
      .vw-tab.active {
        color: var(--fg);
        background: rgba(106,165,255,0.10);
        border-bottom-color: var(--accent);
      }
      .vw-pane { display: none; flex: 1 1 auto;
                 flex-direction: column; gap: 8px; min-height: 0; }
      .vw-pane.active { display: flex; }

      /* SETUP-Tab — Card-Layout fuer klarere Sektionen */
      .vw-setup-card {
        background: rgba(15, 25, 48, 0.55);
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 11px 13px 12px;
        display: flex; flex-direction: column; gap: 9px;
      }
      .vw-setup-card-title {
        font-size: 9px; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.14em;
        color: var(--accent);
        margin-bottom: 2px;
      }

      .vw-setup-row {
        display: flex; align-items: center; gap: 10px;
        font-size: 11px;
      }
      /* Coherent GT setzt sonst einen Default-Hintergrund auf <label> —
         explizit zuruecksetzen damit die Labels nicht wie Buttons aussehen. */
      .vw-setup-row > label,
      .vw-bind-row > label {
        flex: 0 0 86px;
        color: var(--muted);
        background: transparent !important;
        border: none !important;
        padding: 0; margin: 0;
        font-size: 11px; font-weight: 500;
      }
      .vw-setup-row select,
      .vw-setup-row input[type="text"] {
        flex: 1; min-width: 0;
        background: rgba(15, 25, 48, 0.85);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 6px 9px;
        color: var(--fg);
        font: inherit; font-size: 11px;
        outline: none;
        transition: border-color 0.12s, background 0.12s;
      }
      .vw-setup-row select:hover,
      .vw-setup-row input[type="text"]:hover {
        border-color: rgba(106,165,255,0.4);
      }
      .vw-setup-row select:focus,
      .vw-setup-row input[type="text"]:focus {
        border-color: var(--accent);
        background: rgba(15, 25, 48, 1);
      }
      .vw-setup-row input[type="range"] {
        flex: 1; min-width: 0;
        accent-color: var(--accent);
      }
      .vw-setup-row .pct {
        flex: 0 0 46px; text-align: right;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 11px; color: var(--accent); font-weight: 600;
      }

      .vw-mode-toggle {
        display: flex; gap: 6px; flex: 1;
      }
      .vw-mode-btn {
        flex: 1; padding: 7px 10px;
        background: rgba(106,165,255,0.06);
        border: 1px solid var(--border); border-radius: 5px;
        color: var(--muted);
        font-size: 11px; font-weight: 600;
        cursor: pointer; user-select: none;
        text-align: center;
        transition: background 0.12s, color 0.12s, border-color 0.12s;
      }
      .vw-mode-btn:hover {
        background: rgba(106,165,255,0.18);
        color: var(--fg);
        border-color: rgba(106,165,255,0.35);
      }
      .vw-mode-btn.active {
        background: var(--accent); color: #0b1220;
        border-color: var(--accent);
      }

      .vw-bind-row {
        display: flex; align-items: center; gap: 10px;
      }
      .vw-bind-status {
        flex: 1; min-width: 0;
        background: rgba(15, 25, 48, 0.85);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 6px 9px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 10px; color: var(--muted);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .vw-bind-status.waiting {
        color: var(--warn); border-color: rgba(255,180,84,0.4);
        background: rgba(255,180,84,0.08);
      }
      .vw-bind-status.ok {
        color: var(--good); border-color: rgba(63,220,138,0.4);
        background: rgba(63,220,138,0.08);
      }
      .vw-bind-row .vw-mode-btn {
        flex: 0 0 100px;
      }

      /* PRO-Tab */
      .vw-pro-pill {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 4px 10px; border-radius: 999px;
        font-size: 11px; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.08em;
        background: rgba(63,220,138,0.15); color: var(--good);
        border: 1px solid rgba(63,220,138,0.4);
      }
      .vw-pro-pill.free {
        background: rgba(150,170,200,0.10); color: var(--muted);
        border-color: var(--border);
      }
      .vw-pro-section { font-size: 11px; color: var(--muted); }
      .vw-pro-section .vw-h {
        text-transform: uppercase; font-size: 10px;
        letter-spacing: 0.1em; color: var(--muted);
        margin: 8px 0 4px;
      }
      .vw-pro-url {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 10px; color: var(--accent);
        background: rgba(106,165,255,0.06);
        border: 1px solid var(--border); border-radius: 4px;
        padding: 3px 6px; word-break: break-all;
      }
    </style>

    <script type="text/javascript" src="panel.js"></script>
  </head>
  <body class="border-box">
    <ingame-ui
      id="PANEL_MSFSVOICEWALKER"
      panel-id="PANEL_MSFSVOICEWALKER"
      title="MSFSVoiceWalker"
      class="ingameUiFrame panelInvisible"
      content-fit="true"
    >
      <div id="vw-root">
        <!-- Header-Zeile: conn-dot, callsign, pro-badge, zoom-label -->
        <div class="vw-header">
          <div class="w-12 h-12 rounded-xl flex items-center justify-center overflow-hidden ring-1 ring-white/10 shadow-lg shadow-blue-500/20"
               style="background: linear-gradient(135deg, #6aa5ff, #2f5cff);">
            <!-- Inline-SVG-Logo: Radar mit Mikro. -->
            <svg viewBox="0 0 24 24" class="w-7 h-7 text-white relative" fill="none">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="0.8" opacity="0.45" fill="none"/>
              <circle cx="12" cy="12" r="6.5" stroke="currentColor" stroke-width="0.8" opacity="0.6" fill="none"/>
              <circle cx="16.5" cy="8" r="0.9" fill="#3fdc8a"/>
              <rect x="10" y="7.5" width="4" height="6.5" rx="2" fill="currentColor"/>
              <path d="M8.5 12.2 a3.5 3.5 0 0 0 7 0" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/>
              <line x1="12" y1="15.5" x2="12" y2="17.8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="vw-dot" id="vw-conn"></span>
          <span id="vw-label">offline</span>
          <span id="vw-callsign">-</span>
          <span id="vw-probadge"><svg class="vw-icon" width="11" height="11" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/></svg> PRO</span>
          <span id="vw-zoom">1 km</span>
        </div>

        <!-- Optionales Room-Badge (nur bei privatem Raum sichtbar) -->
        <div id="vw-room"><svg class="vw-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><span id="vw-room-label"></span></div>

        <!-- TABS -->
        <div class="vw-tabs">
          <button class="vw-tab active" data-pane="radar">Radar</button>
          <button class="vw-tab" data-pane="setup">Setup</button>
          <button class="vw-tab" data-pane="pro">Pro &amp; Events</button>
        </div>

        <!-- ===== RADAR-PANE ===== -->
        <div class="vw-pane active" id="pane-radar">
          <!-- Radar-Canvas -->
          <div id="vw-radar-wrap">
            <canvas id="radar" width="340" height="340"></canvas>
          </div>

          <!-- Speaking-Banner (nur sichtbar wenn jemand spricht) -->
          <div id="vw-speaking"><svg class="vw-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 19v3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><rect x="9" y="2" width="6" height="13" rx="3"/></svg> <span id="vw-speaking-name"></span></div>

          <!-- Mic-Level -->
          <div id="vw-miclevel-wrap"><div id="vw-miclevel"></div></div>

          <!-- Action-Buttons -->
          <div class="vw-actions">
            <div class="vw-btn ptt" id="vw-ptt" title="Halten zum Sprechen"><svg class="vw-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 19v3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><rect x="9" y="2" width="6" height="13" rx="3"/></svg> PTT</div>
            <div class="vw-btn" id="vw-track" title="Tracking an/aus"><svg class="vw-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19.07 4.93A10 10 0 0 0 6.99 3.34"/><path d="M4 6h.01"/><path d="M2.29 9.62A10 10 0 1 0 21.31 8.35"/><path d="M16.24 7.76A6 6 0 1 0 8.23 16.67"/><path d="M12 18h.01"/><path d="M17.99 11.66A6 6 0 0 1 15.77 16.67"/><circle cx="12" cy="12" r="2"/><path d="m13.41 10.59 5.66-5.66"/></svg> Tracking</div>
            <div class="vw-btn" id="vw-far" title="Weit entfernte Peers einblenden"><svg class="vw-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg> Weit</div>
          </div>

          <!-- Peer-Liste (top 5 in Reichweite + Rest-Counter) -->
          <div id="vw-peers">
            <div id="vw-peers-empty">niemand in der Naehe</div>
          </div>

          <!-- Status-Koordinaten unten -->
          <div id="vw-status">-</div>
        </div>

        <!-- ===== SETUP-PANE ===== -->
        <div class="vw-pane" id="pane-setup">

          <!-- Audio-Karte: Mic + Speaker + Lautstaerke -->
          <div class="vw-setup-card">
            <div class="vw-setup-card-title">Audio</div>
            <div class="vw-setup-row">
              <label for="vw-mic">Mikrofon</label>
              <select id="vw-mic"><option value="">Standard</option></select>
            </div>
            <div class="vw-setup-row">
              <label for="vw-spk">Lautsprecher</label>
              <select id="vw-spk"><option value="">Standard</option></select>
            </div>
            <div class="vw-setup-row">
              <label for="vw-vol">Lautstaerke</label>
              <input type="range" id="vw-vol" min="0" max="150" step="1" value="100">
              <span class="pct" id="vw-vol-val">100%</span>
            </div>
          </div>

          <!-- Steuerung-Karte: Modus + PTT-Bind -->
          <div class="vw-setup-card">
            <div class="vw-setup-card-title">Steuerung</div>
            <div class="vw-setup-row">
              <label>Modus</label>
              <div class="vw-mode-toggle">
                <div class="vw-mode-btn active" id="vw-mode-ptt">PTT</div>
                <div class="vw-mode-btn" id="vw-mode-vox">Offen (VOX)</div>
              </div>
            </div>
            <div class="vw-bind-row">
              <label>PTT-Taste</label>
              <span class="vw-bind-status" id="vw-bind-status">keine</span>
              <div class="vw-mode-btn" id="vw-bind-btn">zuweisen</div>
            </div>
          </div>

          <!-- Profil-Karte: Callsign -->
          <div class="vw-setup-card">
            <div class="vw-setup-card-title">Profil</div>
            <div class="vw-setup-row">
              <label for="vw-cs">Callsign</label>
              <input type="text" id="vw-cs" maxlength="16" placeholder="PILOT">
            </div>
          </div>

        </div>

        <!-- ===== PRO & EVENTS PANE ===== -->
