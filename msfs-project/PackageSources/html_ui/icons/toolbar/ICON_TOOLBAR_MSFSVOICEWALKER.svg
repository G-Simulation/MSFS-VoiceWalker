<?xml version="1.0" encoding="UTF-8"?>
<!-- MSFS Toolbar-Icons sind Monochrom: das Coherent-Toolbar erzwingt weisse
     Fuellung und liefert den Hintergrund (blau bei hover, dunkel im Idle)
     selbst. Das Icon muss deshalb als reine Alpha-Maske designt sein:
     keine farbigen Rects, nur weisse Shapes auf transparentem Canvas. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Radar-Ringe -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#ffffff" stroke-width="2.4" opacity="0.55"/>
  <circle cx="32" cy="32" r="17" fill="none" stroke="#ffffff" stroke-width="2.4" opacity="0.8"/>
  <!-- Mic-Body -->
  <rect x="25" y="16" width="14" height="22" rx="7" fill="#ffffff"/>
  <!-- Mic-Bogen -->
  <path d="M18 34 a14 14 0 0 0 28 0" fill="none" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round"/>
  <!-- Mic-Stand -->
  <line x1="32" y1="42" x2="32" y2="50" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round"/>
</svg>
