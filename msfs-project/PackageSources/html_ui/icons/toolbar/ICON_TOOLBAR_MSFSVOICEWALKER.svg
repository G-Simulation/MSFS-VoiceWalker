<?xml version="1.0" encoding="UTF-8"?>
<!-- MSFS Toolbar-Icon: Coherent GT erzwingt Monochrom-Weiss + Alpha.
     Farbige Hintergruende, Gradients und Akzent-Farben werden ignoriert
     und auf weiss zusammengepresst. Deshalb hier reine Alpha-Maske —
     fette Strokes, sichtbar auf MSFS-Toolbar-Hintergrund (dunkel idle,
     blau bei Hover). Designed fuer 24x24 viewBox. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Aeusserer Radar-Ring -->
    <circle cx="12" cy="12" r="10" stroke-width="1.4" opacity="0.55"/>
    <!-- Innerer Radar-Ring -->
    <circle cx="12" cy="12" r="6.5" stroke-width="1.4" opacity="0.85"/>
    <!-- Mikro-Bogen (unterer Halbkreis als Mic-Stand-Halterung) -->
    <path d="M8.5 12.2 a3.5 3.5 0 0 0 7 0" stroke-width="1.6"/>
    <!-- Mikro-Stand -->
    <line x1="12" y1="15.5" x2="12" y2="17.8" stroke-width="1.6"/>
  </g>
  <!-- Mikro-Body — solider Fill, klare Silhouette ueber den Radar-Ringen -->
  <rect x="10" y="6.5" width="4" height="7.5" rx="2" fill="#ffffff"/>
</svg>
