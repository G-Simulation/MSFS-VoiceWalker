<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none"
     stroke-linejoin="round" stroke-linecap="round">

  <!-- =========  GEFALTETE KARTE (Hintergrund)  ========= -->
  <!-- 3 Panels mit Zickzack an Ober- und Unterkante -->
  <path d="M4 12 L22 7 L22 53 L4 58 Z"   fill="#c9e3ef"/>
  <path d="M22 7 L42 12 L42 58 L22 53 Z" fill="#e7f4fb"/>
  <path d="M42 12 L60 7 L60 53 L42 58 Z" fill="#c9e3ef"/>

  <!-- Äußere Kontur + Falz-Linien -->
  <path d="M4 12 L22 7 L42 12 L60 7 L60 53 L42 58 L22 53 L4 58 Z"
        stroke="#0a0f1a" stroke-width="2.2" fill="none"/>
  <path d="M22 7 L22 53 M42 12 L42 58"
        stroke="#0a0f1a" stroke-width="1.8" fill="none"/>

  <!-- Organische Landmassen (grün) -->
  <path d="M7 22 C 10 18 18 18 23 21 C 30 21 36 23 40 25
           C 46 23 54 26 58 30 C 55 34 49 35 43 33
           C 37 35 30 34 24 33 C 18 34 10 32 7 28 Z"
        fill="#7fd26b" stroke="#0a0f1a" stroke-width="1.8"/>
  <path d="M8 44 C 12 42 17 43 19 46 C 21 50 17 53 13 53
           C 8 53 6 48 8 44 Z"
        fill="#7fd26b" stroke="#0a0f1a" stroke-width="1.8"/>
  <path d="M45 42 C 49 40 55 41 58 45 C 58 50 55 53 51 53
           C 46 53 43 48 45 42 Z"
        fill="#7fd26b" stroke="#0a0f1a" stroke-width="1.8"/>

  <!-- =========  PIN  =========  (Leaflet-Teardrop, orange)
       Kopf-Zentrum bei (32, 22), Spitze bei (32, 54) -->
  <path d="M32 54
           C 28 48  22 38  20 30
           A 12 12 0 1 1 44 30
           C 42 38  36 48  32 54 Z"
        fill="#ff6b3d" stroke="#0a0f1a" stroke-width="2.4"/>

  <!-- =========  MIKRO IM PIN-KOPF  =========
       Weiß, klein und zentral im Kreis-Teil des Pins -->
  <!-- Mikro-Kapsel -->
  <rect x="29" y="15" width="6" height="10" rx="3"
        fill="#ffffff" stroke="#0a0f1a" stroke-width="1.4"/>
  <!-- U-förmiger Bügel unter der Kapsel -->
  <path d="M26.5 23 A5.5 5.5 0 0 0 37.5 23"
        stroke="#ffffff" stroke-width="1.6" fill="none"/>
  <path d="M26.5 23 A5.5 5.5 0 0 0 37.5 23"
        stroke="#0a0f1a" stroke-width="0.9" fill="none"/>
  <!-- Stiel unter dem Bügel -->
  <line x1="32" y1="28" x2="32" y2="30.5"
        stroke="#ffffff" stroke-width="1.6"/>
  <line x1="32" y1="28" x2="32" y2="30.5"
        stroke="#0a0f1a" stroke-width="0.9"/>
</svg>
